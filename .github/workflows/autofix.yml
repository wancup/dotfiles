name: autofix.ci

on:
  pull_request:
    paths:
      - .config/aquaproj-aqua/aqua.yaml
      - .config/aquaproj-aqua/aqua-checksums.json

permissions: {}

jobs:
  autofix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .config/aquaproj-aqua
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.60.1
          working_directory: .config/aquaproj-aqua
        env:
          AQUA_CONFIG: aqua.yaml
          AQUA_LOG_LEVEL: info

      - run: aqua update-checksum --prune

      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
