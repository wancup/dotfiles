name: autofix.ci

on:
  pull_request:
    paths:
      - .config/aquaproj-aqua/aqua.yaml
      - .config/aquaproj-aqua/aqua-checksums.json

permissions: {}

jobs:
  autofix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .config/aquaproj-aqua
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.57.1
          working_directory: .config/aquaproj-aqua
        env:
          AQUA_CONFIG: aqua.yaml
          AQUA_LOG_LEVEL: info

      - run: aqua update-checksum --prune

      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
