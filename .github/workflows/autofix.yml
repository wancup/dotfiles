name: autofix.ci

on:
  pull_request:
    paths:
      - .config/aquaproj-aqua/aqua.yaml
      - .config/aquaproj-aqua/aqua-checksums.json

permissions: {}

jobs:
  autofix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .config/aquaproj-aqua
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false

      - uses: aquaproj/aqua-installer@5e54e5cee8a95ee2ce7c04cb993da6dfad13e59c # v3.1.2
        with:
          aqua_version: v2.57.0
          working_directory: .config/aquaproj-aqua
        env:
          AQUA_CONFIG: aqua.yaml
          AQUA_LOG_LEVEL: info

      - run: aqua update-checksum --prune

      - uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8 # v1.3.3
