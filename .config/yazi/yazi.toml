#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
sort_dir_first = true
show_hidden = true
linemode = "size"

[preview]
wrap = "yes"

[[plugin.prepend_fetchers]]
id = "git"
url = "*"
run = "git"
group = "git"

[[plugin.prepend_fetchers]]
id = "git"
url = "*/"
run = "git"
group = "git"

[[plugin.append_previewers]]
url = "*"
run = 'piper -- hexyl --border=none --terminal-width=$w "$1"'
