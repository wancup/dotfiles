# yaml-language-server: $schema=https://raw.githubusercontent.com/mattn/efm-langserver/master/schema.json

version: 2
lint-debounce: 1s
format-debounce: 0.5s

root-markers:
  - .git/

tools:
  any-typos: &any-typos
    lint-source: typos
    lint-debounce: 3s
    lint-command: "typos - --format brief"
    lint-ignore-exit-code: true
    lint-stdin: true
    lint-severity: 3
    lint-formats:
      - "-:%l:%c: %m"

  dockerfile-hadolint: &dockerfile-hadolint
    lint-source: hadolint
    lint-command: "hadolint --no-color -"
    lint-stdin: true
    lint-formats:
      - "%f:%l DL%n %t%.%#: %m"

  yaml-actionlint: &yaml-actionlint
    lint-source: actionlint
    lint-command: "actionlint -no-color -oneline -"
    lint-stdin: true
    lint-formats:
      - "%f:%l:%c: %.%#: SC%n:%trror:%m"
      - "%f:%l:%c: %.%#: SC%n:%tarning:%m"
      - "%f:%l:%c: %.%#: SC%n:%tnfo:%m"
      - "%f:%l:%c: %m"
    lint-after-open: true

languages:
  =:
    - <<: *any-typos
  dockerfile:
    - <<: *dockerfile-hadolint
  yaml.gha:
    - <<: *yaml-actionlint
